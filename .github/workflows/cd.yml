name: CD — Deploy to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build & Push Docker image
        run: |
          docker build -t legal-rag-chatbot .
          docker tag legal-rag-chatbot:latest ${{ secrets.ECR_REGISTRY }}/legal-rag-chatbot:latest
          docker push ${{ secrets.ECR_REGISTRY }}/legal-rag-chatbot:latest

      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name legal-rag-chatbot \
            --image-uri ${{ secrets.ECR_REGISTRY }}/legal-rag-chatbot:latest